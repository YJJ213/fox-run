<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{ margin:0; padding:0; }
  canvas{ display:block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="144" height="144"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// ===== 背景：夜空渐变（和游戏主页同款）=====
const sky = ctx.createLinearGradient(0, 0, 0, 144);
sky.addColorStop(0, '#0b1026');
sky.addColorStop(1, '#27407a');
ctx.fillStyle = sky;
ctx.fillRect(0, 0, 144, 144);

// 几颗像素星星
ctx.fillStyle = 'rgba(255,255,255,.9)';
ctx.fillRect(70, 4, 3, 3);
ctx.fillStyle = 'rgba(255,255,255,.6)';
ctx.fillRect(9, 34, 3, 3);
ctx.fillRect(132, 12, 3, 3);
ctx.fillStyle = 'rgba(255,255,255,.4)';
ctx.fillRect(28, 8, 2, 2);
ctx.fillRect(118, 44, 2, 2);

// ===== 像素狐狸大头：16×16 格，每格 8px，四周留 8px 边距 =====
// . 透明  K 深色描边  O 橙色  P 粉色内耳  W 白色  B 腮红
const ROWS = [
  '................',
  '.K............K.',
  '.KK..........KK.',
  '.KOK........KOK.',
  '.KOPK......KPOK.',
  '.KOPOKKKKKKOPOK.',
  '.KOOOOOOOOOOOOK.',
  'KOOOOOOOOOOOOOOK',
  'KOOKKOOOOOOKKOOK',
  'KOOKKOOOOOOKKOOK',
  'KWWOOOOOOOOOOWWK',
  'KWWWOOOOOOOOWWWK',
  '.KWWWWWKKWWWWWK.',
  '.KBWWWWKKWWWWBK.',
  '..KWWWWWWWWWWK..',
  '...KKKKKKKKKK...',
];
const COLORS = {
  K: '#241308',
  O: '#ff9233',
  P: '#ffb38a',
  W: '#fff6ec',
  B: '#ffb0a0',
};
const CELL = 8, OX = 8, OY = 8;
for (let r = 0; r < 16; r++) {
  for (let c = 0; c < 16; c++) {
    const ch = ROWS[r][c];
    if (ch === '.') continue;
    ctx.fillStyle = COLORS[ch];
    ctx.fillRect(OX + c * CELL, OY + r * CELL, CELL, CELL);
  }
}

// 眼睛高光（左上角各一小点）
ctx.fillStyle = '#ffffff';
ctx.fillRect(OX + 3 * CELL + 1, OY + 8 * CELL + 1, 3, 3);
ctx.fillRect(OX + 11 * CELL + 1, OY + 8 * CELL + 1, 3, 3);
</script>
</body>
</html>
