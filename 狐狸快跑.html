<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161a24">
<meta property="og:title" content="狐狸快跑 · 不服来战">
<!-- 下面几行让手机"添加到主屏幕"后，像原生 App 一样全屏打开 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>狐狸快跑 · 我的第一个小游戏</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body{
    background: #161a24;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;   /* 防止长按/拖动时选中文字 */
    -webkit-touch-callout: none;                    /* 防止 iOS 长按弹出菜单 */
  }
  #wrap{ position: relative; width: min(96vw, 960px); }
  #game{
    display: block; width: 100%; border-radius: 14px;
    box-shadow: 0 12px 48px rgba(0,0,0,.5);
    touch-action: none;   /* 手机上防止触摸画布时页面跟着滚动 */
  }
  #muteBtn{
    position: absolute; top: 12px; right: 12px; font-size: 17px; line-height: 1;
    background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 8px;
    padding: 6px 9px; cursor: pointer;
  }
  #muteBtn:hover{ background: rgba(255,255,255,.3); }
  #shopBtn{
    position: absolute; top: 12px; right: 56px; font-size: 17px; line-height: 1;
    background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 8px;
    padding: 6px 9px; cursor: pointer;
  }
  #shopBtn:hover{ background: rgba(255,255,255,.3); }
  #pauseBtn{
    position: absolute; top: 12px; right: 100px; font-size: 17px; line-height: 1;
    background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 8px;
    padding: 6px 9px; cursor: pointer;
  }
  #pauseBtn:hover{ background: rgba(255,255,255,.3); }
  #reviveBtn{
    position: absolute; left: 50%; bottom: 14%; transform: translateX(-50%);
    background: #ffd34d; color: #4a3500; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 17px; font-weight: bold; cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,.4); z-index: 5;
  }
  #reviveBtn.hidden{ display: none; }
  #dailyBtn{
    position: absolute; left: 12px; bottom: 12px; z-index: 5;
    background: rgba(0,0,0,.35); color: #ffd34d; border: 1px solid rgba(255,211,77,.5);
    border-radius: 10px; padding: 9px 14px; font-size: 14px; font-weight: bold; cursor: pointer;
  }
  #dailyBtn.hidden{ display: none; }
  #copyBtn{
    position: absolute; left: 50%; bottom: 14%; transform: translateX(-50%); z-index: 5;
    background: #7df9ff; color: #04353a; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  #copyBtn.hidden{ display: none; }
  /* —— 首次进入的"创建主角"弹窗 —— */
  #avatarAsk{
    position: fixed; inset: 0; z-index: 12;
    background: rgba(8,12,24,.7);
    display: flex; align-items: center; justify-content: center;
  }
  #avatarAsk.hidden{ display: none; }
  #avatarCard{
    background: #202737; color: #fff; border-radius: 14px; text-align: center;
    padding: 24px 26px; width: min(88vw, 360px);
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
  }
  #avatarCard h2{ margin: 0 0 8px; font-size: 21px; }
  #avatarCard p{ color: #aab6d0; font-size: 14px; line-height: 1.7; margin: 0 0 16px; }
  #avatarAskUp{
    display: block; width: 100%; border: none; border-radius: 10px; padding: 13px;
    background: #ffd34d; color: #4a3500; font-size: 16px; font-weight: bold; cursor: pointer;
  }
  #avatarAskSkip{
    display: block; width: 100%; border: none; border-radius: 10px; padding: 10px;
    margin-top: 10px; background: rgba(255,255,255,.12); color: #97a1b8; font-size: 13px; cursor: pointer;
  }
  #tip{ color: #7e879c; font-size: 13px; margin-top: 12px; text-align: center; padding: 0 12px; }

  /* ===== 手机适配 ===== */
  /* 触屏设备：按钮加大，手指才按得准 */
  @media (pointer: coarse){
    #muteBtn{ font-size: 24px; padding: 12px 14px; top: 10px; right: 10px; }
    #shopBtn{ font-size: 24px; padding: 12px 14px; top: 10px; right: 76px; }
    #pauseBtn{ font-size: 24px; padding: 12px 14px; top: 10px; right: 142px; }
    #dailyBtn{ font-size: 16px; padding: 12px 16px; }
    .shop-row button{ padding: 12px 18px; font-size: 15px; }
    #shopClose{ padding: 14px; font-size: 16px; }
  }
  @media (max-width: 920px){
    body{ overflow: hidden; }   /* 手机上禁止页面被拖来拖去 */
    #tip{ display: none; }      /* 操作说明游戏里都有，不占屏幕 */
    #game{ border-radius: 0; }
    /* 小屏幕上商店排得更紧凑，一屏能装下更多内容 */
    #shopCard{ padding: 12px 14px; }
    #shopCard h2{ font-size: 17px; }
    .shop-prev{ width: 56px; height: 44px; font-size: 20px; }
    .shop-row{ padding: 7px 0; gap: 8px; }
    .shop-row b{ font-size: 14px; }
    .shop-row small{ font-size: 12px; }
    #avatarCard{ max-height: 86vh; overflow-y: auto; }
  }
  /* 手机横屏：游戏铺满整个屏幕 */
  @media (max-width: 920px) and (orientation: landscape){
    #wrap{ width: 100vw; }
  }
  /* 手机竖屏：把整个游戏（和商店）旋转 90°——打开就是满屏大横屏，不用手动转手机 */
  @media (max-width: 920px) and (orientation: portrait){
    #wrap, #shop, #avatarAsk{
      position: fixed; inset: auto; top: 0; left: 0;
      width: 100vh; height: 100vw;       /* 宽高互换（老浏览器的回退写法） */
      width: 100dvh; height: 100dvw;     /* dvh/dvw 会把浏览器工具栏算进去，更准 */
      transform: rotate(90deg) translateY(-100%);
      transform-origin: top left;
      display: flex; align-items: center; justify-content: center;
    }
    /* 旋转之后弹窗的"纵向"其实是屏幕的短边——尺寸必须按父容器的百分比算，
       不能再用 vh（vh 指的还是竖屏的长边，会算出一个装不下的高度，把内容顶出屏幕） */
    #shopCard, #avatarCard{
      max-height: 92%; width: min(76%, 460px);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
  }
  /* —— 商店弹窗 —— */
  #shop{
    position: fixed; inset: 0; z-index: 10;
    background: rgba(8,12,24,.65);
    display: flex; align-items: center; justify-content: center;
  }
  #shop.hidden{ display: none; }
  #shopCard{
    background: #202737; color: #fff; border-radius: 14px;
    padding: 18px 20px; width: min(92vw, 460px);
    max-height: 86vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;   /* iOS 上滚动更顺滑 */
    box-shadow: 0 16px 60px rgba(0,0,0,.55);
  }
  .chip{
    display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 99px;
    background: #4f87d6; color: #fff; margin-left: 6px; vertical-align: 2px;
  }
  .chip-g{ background: #9b59d0; }
  #shopCard h2{ margin: 0 0 4px; font-size: 20px; display: flex; justify-content: space-between; align-items: center; }
  #shopCard h2 span{ font-size: 15px; color: #ffd34d; }
  #shopTabs{ display: flex; gap: 8px; margin: 10px 0 4px; }
  #shopTabs button{
    flex: 1; border: none; border-radius: 8px; padding: 9px;
    background: rgba(255,255,255,.10); color: #97a1b8; font-size: 14px; cursor: pointer;
  }
  #shopTabs button.active{ background: #ffd34d; color: #4a3500; font-weight: bold; }
  #tabGem.active{ background: #23bcc9; color: #04353a; }
  .shop-row{
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .shop-row b{ font-size: 15px; }
  .shop-row small{ display: block; color: #97a1b8; margin-top: 2px; }
  .shop-row .grow{ flex: 1; }
  .shop-prev{
    width: 72px; height: 56px; flex: none;
    background: rgba(255,255,255,.07); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .shop-prev img{ width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
  .shop-row button{
    border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer;
    background: #ffd34d; color: #4a3500; font-weight: bold; white-space: nowrap; font-size: 13px;
  }
  .shop-row button:disabled{ background: #3a4357; color: #97a1b8; cursor: default; }
  #shopClose{
    margin-top: 14px; width: 100%; border: none; border-radius: 8px; padding: 9px;
    background: rgba(255,255,255,.14); color: #fff; cursor: pointer; font-size: 14px;
  }
</style>

<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <button id="muteBtn" title="静音 (M)">🔊</button>
  <button id="shopBtn" title="商店 (B)">🛒</button>
  <button id="pauseBtn" title="暂停 (P)">⏸️</button>
  <button id="reviveBtn" class="hidden">复活</button>
  <button id="dailyBtn" class="hidden">☀️ 今日挑战</button>
  <button id="copyBtn" class="hidden">📋 复制战绩发群里</button>
</div>
<p id="tip">空格 / ↑ / 点击屏幕 = 跳跃（长按跳得更高） · P 暂停 · M 静音 · B 商店</p>

<!-- 商店弹窗（平时隐藏，货架内容由 renderShop() 动态生成） -->
<div id="shop" class="hidden">
  <div id="shopCard">
    <h2>🛒 商店 <span id="shopCoins"></span></h2>
    <div id="shopTabs">
      <button id="tabCoin" class="active">💰 金币商店</button>
      <button id="tabGem">💎 钻石商店</button>
    </div>
    <div id="shopList"></div>
    <button id="shopClose">关 闭</button>
    <input type="file" id="avatarFile" accept="image/*" hidden>
  </div>
</div>

<!-- 首次进入：创建主角弹窗（上传照片当脸） -->
<div id="avatarAsk" class="hidden">
  <div id="avatarCard">
    <h2>📸 把主角换成你！</h2>
    <p>刚才那个阵亡表情，换成你自己的脸更搞笑——<br>上传照片，撞墙 / 吃道具 / 阵亡都有你的专属表情包</p>
    <button id="avatarAskUp">📷 上传照片（推荐）</button>
    <button id="avatarAskSkip">稍后再说</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   《狐狸快跑》—— 一个单文件 HTML5 跑酷小游戏

   双击这个文件就能在浏览器里玩，发给朋友也只需要传这一个文件。

   代码导览（想学的话建议按这个顺序读）：
     1.  常量配置     —— 想调手感和难度，改这里的数字就行
     2.  画布与缩放
     3.  工具函数
     4.  音效与背景音乐 —— 全部用代码现场合成，不需要任何音频文件
     5.  游戏全局状态
     6.  玩家与角色   —— 角色表 CHARS：长相、连跳/滑翔能力、价格
     7.  输入处理     —— 键盘 + 鼠标 + 触屏
     8.  开始 / 死亡 / 重开
     9.  粒子特效
     10. 障碍物与金币的生成
     11. 每帧更新（游戏规则都在这）
     12. 背景与世界绘制（昼夜循环、视差远山）
     13. 界面文字
     14. 渲染一帧
     15. 商店
     16. 主循环

   常用改装指南：
     · 想跳得更高      → 把 JUMP_VY 改成 -900 试试
     · 想更快/更慢     → SPEED_START / SPEED_MAX / SPEED_RAMP
     · 障碍更密/更稀   → update() 里 distToObstacle 的公式
     · 角色/能力/价格  → CHARS（想加新动物：在那里加一行，再到 drawCharacter 里画它）
     · 换背景音乐      → BGM_MELODY / BGM_BASS 里的音符数字
     · 想恢复"撞到就死" → 把 ENDLESS 改成 false
     · 道具时长/效果   → POWER_DUR 和 activatePower()
     · 坑的宽度/出现率 → spawnObstacle 开头的 pits 部分
     · 商店货架与价格  → SHOP_GOODS
   ============================================================ */

/* ========== 1. 常量配置 ========== */
const W = 900, H = 300;        // 游戏画面的逻辑尺寸（实际显示会等比缩放）
const GROUND_Y = 256;          // 地面顶端的 y 坐标。注意：画布的 y 轴朝下，0 在最上方，数字越大越靠下
const GRAVITY  = 2400;         // 重力加速度（像素/秒²）
const JUMP_VY  = -820;         // 起跳瞬间的向上速度（负数代表向上）
const JUMP_CUT = -420;         // 提前松开跳跃键时，上升速度立刻衰减到这个值 →"长按跳更高"（越接近 0，轻点跳得越矮）
const SPEED_START = 330;       // 初始奔跑速度
const SPEED_MAX   = 740;       // 速度上限
const SPEED_RAMP  = 9;         // 每秒增加多少速度（难度曲线）
const COYOTE = 0.08;           // 土狼时间：离开地面后这么多秒内仍允许起跳（经典手感技巧）
const BUFFER = 0.12;           // 跳跃缓冲：落地前这么多秒内按下的跳跃，落地瞬间会自动执行
const CYCLE  = 80;             // 昼夜循环一圈的秒数
const ENDLESS = true;          // true=撞障碍只扣分不致死（但掉坑永远是致命的！）；false=撞到障碍也直接结束

/* ========== 2. 画布与缩放 ========== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 让画布在任何屏幕（包括高分屏）上都清晰：
// 内部像素 = CSS 尺寸 × devicePixelRatio，再用 transform 把坐标系映射回 900×300
function resize(){
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 900;
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssW * dpr * H / W);
  canvas.style.height = (cssW * H / W) + 'px';
  ctx.setTransform(canvas.width / W, 0, 0, canvas.width / W, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ========== 3. 工具函数 ========== */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rand  = (a, b) => a + Math.random() * (b - a);
const FONT  = '"PingFang SC","Microsoft YaHei",sans-serif';
const TAU   = Math.PI * 2;   // 一整圈的弧度（= 2π）。画圆的角度用"弧度"表示，转一整圈就是 TAU

// 圆角矩形路径（老一点的浏览器没有自带的 roundRect，所以自己写一个）
function rr(x, y, w, h, r){
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}
function hexToRgb(h){
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
function lerpColor(a, b, t){
  const A = hexToRgb(a), B = hexToRgb(b);
  return 'rgb(' + Math.round(A[0]+(B[0]-A[0])*t) + ',' +
                  Math.round(A[1]+(B[1]-A[1])*t) + ',' +
                  Math.round(A[2]+(B[2]-A[2])*t) + ')';
}
const smooth = t => t * t * (3 - 2 * t);   // 让过渡更柔和的小函数

/* ========== 4. 音效 ========== */
let actx = null, muted = false;
try{ muted = localStorage.getItem('fox_muted') === '1'; }catch(e){}

// 浏览器规定：声音必须在用户第一次点击/按键之后才能播放，所以在输入事件里调它
let masterGain = null;   // 总音量开关：所有声音都先经过它，静音=拧到 0（已经发出的音也立刻消失）
function ensureAudio(){
  if(!actx){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC){
      actx = new AC();
      masterGain = actx.createGain();
      masterGain.gain.value = muted ? 0 : 1;
      masterGain.connect(actx.destination);
    }
  }
  // 只要不在播放状态就尝试恢复（iOS 上来电/切后台会把状态变成 'interrupted'）
  if(actx && actx.state !== 'running') actx.resume().catch(() => {});
}
// 万能小喇叭：给定起始频率、结束频率、时长、波形，就能合成一个音效
function beep(o){
  if(muted || !actx) return;
  const f0 = o.f0, f1 = (o.f1 === undefined ? o.f0 : o.f1);
  const dur = o.dur || 0.1, type = o.type || 'square';
  const vol = o.vol || 0.045, delay = o.delay || 0;
  const t = actx.currentTime + delay;
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.05);
}
const sfx = {
  jump(mult){ const m = mult || 1;   // mult 越大音调越高（连跳的第二、三段用）
              beep({f0:340*m, f1:680*m, dur:0.13, type:'square', vol:0.04}); },
  land(){ beep({f0:160,  f1:90,   dur:0.07, type:'triangle', vol:0.035}); },
  coin(){ beep({f0:1175, dur:0.06, type:'sine', vol:0.05});
          beep({f0:1568, dur:0.09, type:'sine', vol:0.05, delay:0.06}); },
  hit(){  beep({f0:220,  f1:90,   dur:0.18, type:'sawtooth', vol:0.05 }); },
  power(){ beep({f0:523, dur:0.08, type:'square', vol:0.05});               // 吃到道具：上行琶音
           beep({f0:659, dur:0.08, type:'square', vol:0.05, delay:0.08});
           beep({f0:784, dur:0.14, type:'square', vol:0.05, delay:0.16}); },
  smash(){ beep({f0:140, f1:60, dur:0.12, type:'square',   vol:0.06});      // 撞碎障碍
           beep({f0:90,  f1:40, dur:0.16, type:'sawtooth', vol:0.05, delay:0.02}); },
  die(){  // 经典"游戏结束"下行小旋律：噔-噔-噔-噔……咚
    beep({f0:659, dur:0.12, type:'square',   vol:0.05});
    beep({f0:622, dur:0.12, type:'square',   vol:0.05, delay:0.13});
    beep({f0:587, dur:0.12, type:'square',   vol:0.05, delay:0.26});
    beep({f0:554, dur:0.26, type:'square',   vol:0.05, delay:0.39});
    beep({f0:277, dur:0.5,  type:'triangle', vol:0.07, delay:0.55});
    beep({f0:262, dur:0.8,  type:'triangle', vol:0.07, delay:0.75});
  },
};
const muteBtn = document.getElementById('muteBtn');
function refreshMuteBtn(){ muteBtn.textContent = muted ? '🔇' : '🔊'; }
refreshMuteBtn();
function toggleMute(){
  muted = !muted;
  try{ localStorage.setItem('fox_muted', muted ? '1' : '0'); }catch(e){}
  refreshMuteBtn();
  if(masterGain) masterGain.gain.value = muted ? 0 : 1;   // 总闸立刻生效，连已排队的音符都会消失
  if(muted) stopBGM();
  else { ensureAudio(); startBGM(); }   // 取消静音时把音乐续上
}
muteBtn.addEventListener('click', () => { toggleMute(); muteBtn.blur(); });
const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', function(){
  if(game.state === 'playing') paused = !paused;   // 只有游戏进行中才能暂停/继续
  this.blur();

/* —— 背景音乐：一段 4 小节的小曲子无限循环，也是代码现场合成的 —— */
// 数字是 MIDI 音高（69 = 标准音 A4，每 +12 升一个八度），0 = 休止符
// 和弦走向 C → G → Am → F，流行歌里用烂了的"万能四和弦"
const BGM_MELODY = [
  76,79,84,79, 76,79,72,76,   // C 和弦琶音
  74,79,83,79, 74,79,71,74,   // G
  76,81,84,81, 76,81,72,76,   // Am
  77,81,84,81, 77,84,81,77,   // F
];
const BGM_BASS = [ 48,55,48,55, 43,50,43,50, 45,52,45,52, 41,48,41,48 ];   // 低音声部
const BGM_STEP = 0.25;   // 一个八分音符的时长（秒）。改小曲子变快，改大变慢
const bgm = { on: false, step: 0, nextTime: 0, timer: null };

function midiToFreq(m){ return 440 * Math.pow(2, (m - 69) / 12); }
function playNote(midi, t, dur, type, vol){
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = midiToFreq(midi);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.05);
}
// WebAudio 的常用玩法：用一个普通定时器，把"接下来一秒多"的音符提前排进播放队列
function scheduleBGM(){
  if(!actx || muted) return;
  if(paused || document.hidden) return;   // 暂停或切到后台时，音乐也跟着停
  // 停了一阵子（暂停/后台回来）的话，把排队起点拉回"现在"，避免一瞬间补播一堆旧音符
  if(bgm.nextTime < actx.currentTime) bgm.nextTime = actx.currentTime + 0.05;
  while(bgm.nextTime < actx.currentTime + 1.2){
    const i = bgm.step % BGM_MELODY.length;
    if(BGM_MELODY[i]) playNote(BGM_MELODY[i], bgm.nextTime, 0.22, 'square', 0.013);
    if(i % 2 === 0){
      const b = BGM_BASS[(i / 2) % BGM_BASS.length];
      if(b) playNote(b, bgm.nextTime, 0.4, 'triangle', 0.028);
    }
    bgm.nextTime += BGM_STEP;
    bgm.step++;
  }
}
function startBGM(){
  if(bgm.on || muted || !actx) return;
  bgm.on = true;
  bgm.nextTime = actx.currentTime + 0.05;
  bgm.timer = setInterval(scheduleBGM, 300);
  scheduleBGM();
}
function stopBGM(){
  if(bgm.timer){ clearInterval(bgm.timer); bgm.timer = null; }
  bgm.on = false;
}

function todayStr(){ return new Date().toDateString(); }
function dateNum(){ const d = new Date(); return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate(); }
// mulberry32：可指定种子的伪随机数生成器——同一个种子永远吐出同一串随机数
// 今日挑战用"今天的日期"当种子，于是全国玩家当天跑到的是同一张图，分数才有可比性
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let seededRng = Math.random;
function srand(){ return dailyMode ? seededRng() : Math.random(); }   // 生成赛道内容专用的随机数
function srange(a, b){ return a + srand() * (b - a); }

}

// 每日任务：按日期种子抽 3 条，全清追加 1💎
const TASK_POOL = [
  { id: 'coins',  name: '吃到 {g} 枚金币',       goal: 100, type: 'daily' },
  { id: 'meters', name: '单局跑出 {g} 米',       goal: 800, type: 'single' },
  { id: 'smash',  name: '撞碎 {g} 个障碍',       goal: 15,  type: 'daily' },
  { id: 'bonus',  name: '进 {g} 次超级奖励关',   goal: 1,   type: 'daily' },
  { id: 'bunny',  name: '抓住 {g} 只钻石兔',     goal: 1,   type: 'daily' },
  { id: 'items',  name: '吃到 {g} 个道具',       goal: 8,   type: 'daily' },
];
const TASK_REWARDS = [{ coins: 60 }, { coins: 120 }, { gems: 1 }];
function ensureDaily(){
  const today = todayStr();
  if(save.daily && save.daily.date === today) return;
  const rng = mulberry32(dateNum());   // 全国玩家同一天抽到同一组任务
  const pool = TASK_POOL.slice();
  const tasks = [];
  for(let i = 0; i < 3; i++){
    const t = pool.splice(Math.floor(rng() * pool.length), 1)[0];
    tasks.push({ id: t.id, goal: t.goal, prog: 0, done: false });
  }
  save.daily = { date: today, tasks: tasks, allDone: false };
  saveSave();
}
function taskName(t){
  return TASK_POOL.find(x => x.id === t.id).name.replace('{g}', t.goal);
}
// 任务进度埋点：游戏里的各个事件调它（type=single 的任务取单局最大值）
function taskProg(id, amount, singleValue){
  if(!save.daily || save.daily.date !== todayStr()) return;
  const t = save.daily.tasks.find(x => x.id === id && !x.done);
  if(!t) return;
  const def = TASK_POOL.find(x => x.id === id);
  if(def.type === 'single') t.prog = Math.max(t.prog, singleValue || 0);
  else t.prog += (amount || 1);
  if(t.prog >= t.goal){
    t.done = true;
    const rwd = TASK_REWARDS[save.daily.tasks.indexOf(t)] || { coins: 60 };
    save.coins += rwd.coins || 0; save.gems += rwd.gems || 0;
    showBanner('✅ 任务完成：' + taskName(t) + '  +' + (rwd.coins ? rwd.coins + '💰' : rwd.gems + '💎'), 2.4, '#b8ffb0');
    sfx.power();
    if(save.daily.tasks.every(x => x.done) && !save.daily.allDone){
      save.daily.allDone = true;
      save.gems += 1;
      showBanner('🏆 今日任务全清！额外 +1💎', 2.8, '#7df9ff');
    }
    saveSave();
  }
}

/* ========== 7. 输入处理 ========== */
// jumpHeld 记录"跳跃键现在被谁按着"：null=没人 | 'key'=键盘 | 'pointer'=鼠标/手指。
// 按下和松开必须来自同一方才算配对，否则会出现
// "键盘长按大跳时，在别处点了一下鼠标，跳跃被莫名打断"这类怪事。
let jumpHeld = null;
function pressJump(source){
  ensureAudio();
  if(paused){ paused = false; return; }
  if(game.state === 'ready'){ startGame(); return; }   // 第一次点击直接开玩（照片邀请挪到第 2 局结束后）
  if(game.state === 'dead'){
    // 死后稍等才接受重开，防止按键把结算画面"按穿"；
    // 如果复活按钮亮着，多等一会儿，免得手快误点屏幕错过复活机会
    const canRevive = !dailyMode && (!save.freeReviveUsed || save.coins >= 200 * (reviveCount + 1));
    if(bgTime - game.deadAt > (canRevive ? 1.5 : 0.45)) startGame();
    return;
  }
  jumpHeld = source;
  // 空中连跳：角色还有剩余跳跃段数时，在空中按跳跃就直接再跳一次
  const ch = dailyMode ? CHARS.fox : (CHARS[save.char] || CHARS.fox);   // 日赛统一用橙狐裸跑，分数才可比
  const maxJumps = ch.jumps + (save.mount && !dailyMode ? 1 : 0);   // 坐骑·筋斗云：所有角色额外 +1 段跳
  if(!player.grounded && power.type !== 'fly' && bgTime - player.lastGrounded > COYOTE && player.jumpsUsed < maxJumps &&
     player.y < GROUND_Y + 26){   // 掉坑太深就救不回来了
    airJump();
    return;
  }
  player.lastPress = bgTime;
}
function airJump(){
  const p = player;
  p.jumpsUsed++;
  p.vy = JUMP_VY * 0.88;   // 空中跳比地面跳略矮一点
  p.gliding = false;
  sfx.jump(1 + 0.18 * (p.jumpsUsed - 1));   // 第二、三段跳音调依次升高
  burst(p.x + p.w / 2, p.y - 4, 7, ['#ffffff', '#cfe4ff']);   // 蹬空气的小白花
}
function releaseJump(source){
  if(jumpHeld !== source) return;   // 不是按下的那一方松开的，不算数
  jumpHeld = null;
  // 上升途中松手 → 砍掉一部分上升速度，实现"长按跳得更高"
  if(game.state === 'playing' && player.vy < JUMP_CUT) player.vy = JUMP_CUT;
}
window.addEventListener('keydown', e => {
  if(avatarAskOpen()){   // "创建主角"弹窗开着时：ESC 可以暂时关掉（下次还会再问）

    return;
  }
  if(e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();  // 防止空格滚动页面
  if(e.repeat) return;   // 忽略按住不放产生的重复事件
  if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') pressJump('key');
  else if(e.code === 'KeyP'){ if(game.state === 'playing') paused = !paused; }
  else if(e.code === 'KeyM') toggleMute();
  else if(e.code === 'KeyB') toggleShop(true);
  else if(e.code === 'KeyR'){ if(game.state === 'dead' && bgTime - game.deadAt > 0.45) startGame(); }
});

});
canvas.addEventListener('pointerdown', e => {

});

// 触摸被系统打断（来电、下拉通知栏等）时，浏览器发的是 pointercancel 而不是 pointerup
window.addEventListener('pointercancel', () => releaseJump('pointer'));

window.addEventListener('click',     () => { ensureAudio(); if(game.state === 'playing') startBGM(); });
canvas.addEventListener('contextmenu', e => e.preventDefault());   // 屏蔽画布上的右键菜单
